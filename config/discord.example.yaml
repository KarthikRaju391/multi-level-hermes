# Copy relevant values into config/local.yaml or your Hermes profile secrets.
# Do not commit real Discord bot tokens or private channel IDs if the repo is public.

gateway:
  provider: discord
  mode: single_bot_router
  source_of_truth: markdown
  default_action_policy: read_only

discord:
  server_name: Hermes Command

  bot:
    display_name: Hermes
    token_env: DISCORD_HERMES_BOT_TOKEN

  channel_ids:
    # Fill locally after creating channels.
    route_to_profile: "000000000000000000"
    personal_chat: "000000000000000000"
    personal_radar: "000000000000000000"
    personal_daily: "000000000000000000"
    work_chat: "000000000000000000"
    work_radar: "000000000000000000"
    work_tickets: "000000000000000000"
    work_approvals: "000000000000000000"
    daily_review: "000000000000000000"
    weekly_review: "000000000000000000"
    patterns: "000000000000000000"
    gateway_status: "000000000000000000"
    cron_log: "000000000000000000"
    boundary_alerts: "000000000000000000"

  channel_profile_map:
    personal_chat: personal
    personal_radar: personal
    personal_daily: personal
    work_chat: work
    work_radar: work
    work_tickets: work
    work_approvals: work
    daily_review: insights
    weekly_review: insights
    patterns: insights

  router_channel:
    channel: route_to_profile
    required_prefixes:
      personal: "p:"
      work: "w:"
      insights: "i:"

  profile_boundaries:
    personal:
      allowed_write_roots:
        - ./memory/personal
      denied_scopes:
        - work
    work:
      allowed_write_roots:
        - ./memory/work
      denied_scopes:
        - personal
    insights:
      allowed_read_roots:
        - ./memory/personal
        - ./memory/work
      allowed_write_roots:
        - ./memory/insights
      denied_actions:
        - external_writes

  minimal_permissions:
    allow:
      - View Channel
      - Send Messages
      - Read Message History
      - Use Application Commands
    deny:
      - Administrator
      - Manage Channels
      - Manage Webhooks
      - Manage Messages
      - Mention Everyone
